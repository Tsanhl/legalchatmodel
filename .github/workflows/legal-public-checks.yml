name: Legal public release checks

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  verify-public-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install runtime dependencies
        run: python -m pip install -e .
      - name: Verify legal quality, privacy and multi-user isolation
        run: python scripts/verify_legal_app.py
      - name: Validate deployment scripts
        run: bash -n scripts/public_chat_ui.sh scripts/backup_public_data.sh

  verify-windows-backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Windows application dependencies
        run: python -m pip install -r requirements-windows.txt
      - name: Verify local llama-server adapter
        run: python scripts/verify_windows_backend.py
      - name: Parse Windows PowerShell launchers
        shell: pwsh
        run: |
          $null = [scriptblock]::Create((Get-Content scripts/setup_windows.ps1 -Raw))
          $null = [scriptblock]::Create((Get-Content scripts/chat_ui_windows.ps1 -Raw))
      - name: Compile cross-platform application
        run: python -m py_compile legal_chat_ui/server.py legal_chat_ui/llama_server_backend.py scripts/export_v11_gguf.py

# Corrective continuation from the selected V7 adapter. The added targets teach
# complete-answer structure and verified proposition-level OSCOLA presentation.
model: "mlx-community/Qwen2.5-7B-Instruct-Uncensored-4bit"
train: true
test: false

fine_tune_type: lora
optimizer: adamw
data: "data/legal_answer_flow_v8_complete_answer"
adapter_path: "adapters/legal_answer_flow_v8_complete_answer_lora"
resume_adapter_file: "adapters/legal_answer_flow_v7_marked_gold_lora/adapters.safetensors"

seed: 89
num_layers: 16
batch_size: 1
grad_accumulation_steps: 4
iters: 20
learning_rate: 2e-6

mask_prompt: true
max_seq_length: 4096
grad_checkpoint: true

steps_per_report: 5
steps_per_eval: 10
val_batches: 12
save_every: 10
test_batches: -1

lora_parameters:
  keys: ["self_attn.q_proj", "self_attn.v_proj"]
  rank: 8
  scale: 20.0
  dropout: 0.0

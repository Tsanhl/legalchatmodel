# V7: fresh-base corrective LoRA. Every assistant target is marker-approved
# answer prose; lower-mark scripts are excluded from targets and used only by
# runtime assessment guidance.
model: "mlx-community/Qwen2.5-7B-Instruct-Uncensored-4bit"
train: true
test: false

fine_tune_type: lora
optimizer: adamw
data: "data/legal_answer_flow_v7_marked_gold"
adapter_path: "adapters/legal_answer_flow_v7_marked_gold_lora"

seed: 73
num_layers: 16
batch_size: 1
grad_accumulation_steps: 4
iters: 80
learning_rate: 5e-6

mask_prompt: true
max_seq_length: 4096
grad_checkpoint: true

steps_per_report: 10
steps_per_eval: 20
val_batches: 12
save_every: 20
test_batches: -1

lora_parameters:
  keys: ["self_attn.q_proj", "self_attn.v_proj"]
  rank: 8
  scale: 20.0
  dropout: 0.0

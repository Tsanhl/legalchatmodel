model: "mlx-community/Qwen2.5-7B-Instruct-Uncensored-4bit"
train: true
test: false

fine_tune_type: lora
optimizer: adamw
data: "data/legal_answer_flow_v11_specialist"
adapter_path: "adapters/legal_answer_flow_v11_specialist_lora"
resume_adapter_file: "adapters/legal_answer_flow_v10_stability_lora/adapters.safetensors"

seed: 111
num_layers: 16
batch_size: 1
grad_accumulation_steps: 1
iters: 30
learning_rate: 5e-7

mask_prompt: true
max_seq_length: 4096
grad_checkpoint: true

steps_per_report: 2
steps_per_eval: 10
val_batches: 4
save_every: 10
test_batches: -1

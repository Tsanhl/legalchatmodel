# Continuation from the verified clean iteration-50 checkpoint.
model: "mlx-community/Qwen2.5-7B-Instruct-Uncensored-4bit"
train: true
test: false

fine_tune_type: lora
optimizer: adamw
data: "data/legal_answer_flow_feedback_v2"
adapter_path: "adapters/legal_answer_flow_feedback_v3_clean_resume_lora"
resume_adapter_file: "adapters/legal_answer_flow_feedback_v3_clean_lora/0000050_adapters.safetensors"

seed: 23
num_layers: 16
batch_size: 1
grad_accumulation_steps: 4
iters: 50
learning_rate: 5e-6

mask_prompt: true
max_seq_length: 4096
grad_checkpoint: true

steps_per_report: 10
steps_per_eval: 25
val_batches: 16
save_every: 25
test_batches: -1

lora_parameters:
  keys: ["self_attn.q_proj", "self_attn.v_proj"]
  rank: 8
  scale: 20.0
  dropout: 0.0

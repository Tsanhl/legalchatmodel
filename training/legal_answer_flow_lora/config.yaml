# Legal answer-flow QLoRA config.
# This trains behaviour/style/discipline; legal knowledge remains in RAG/model_database.

model: "mlx-community/Qwen2.5-7B-Instruct-Uncensored-4bit"
train: true
test: false

fine_tune_type: lora
optimizer: adamw
data: "data/legal_answer_flow_lora"
adapter_path: "adapters/legal_answer_flow_lora"

seed: 0
num_layers: 16
batch_size: 1
grad_accumulation_steps: 4
iters: 80
learning_rate: 1e-5

mask_prompt: true
max_seq_length: 4096
grad_checkpoint: true

steps_per_report: 10
steps_per_eval: 20
val_batches: -1
save_every: 40
test_batches: -1

lora_parameters:
  keys: ["self_attn.q_proj", "self_attn.v_proj"]
  rank: 8
  scale: 20.0
  dropout: 0.0

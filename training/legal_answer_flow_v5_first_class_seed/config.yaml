model: "mlx-community/Qwen2.5-7B-Instruct-Uncensored-4bit"
train: true
test: false

fine_tune_type: lora
optimizer: adamw
data: "data/legal_answer_flow_v5_first_class_seed"
adapter_path: "adapters/legal_answer_flow_v5_first_class_seed_lora"

seed: 37
num_layers: 16
batch_size: 1
grad_accumulation_steps: 2
iters: 12
learning_rate: 1e-6

mask_prompt: true
max_seq_length: 4096
grad_checkpoint: true

steps_per_report: 2
steps_per_eval: 3
val_batches: 1
save_every: 3
test_batches: -1

lora_parameters:
  keys: ["self_attn.q_proj", "self_attn.v_proj"]
  rank: 8
  scale: 16.0
  dropout: 0.0
